<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizSpark — Plataforma de quizzes interactivos</title>
  <meta name="description" content="QuizSpark: plataforma educativa de quizzes interactivos para el aula." />

  <!-- Tipografías -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- Estilos del proyecto -->
  <link rel="stylesheet" href="styles.css" />

  <!-- React 18 + Babel para JSX en navegador -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Pantalla de carga mínima mientras Babel compila -->
  <noscript>
    <p style="text-align:center;padding:2rem;font-family:sans-serif;">
      Esta aplicación requiere JavaScript habilitado.
    </p>
  </noscript>

  <!-- Archivos del proyecto en orden de dependencias.
       type="text/babel" hace que Babel los compile en el navegador. -->
  <script type="text/babel" data-presets="react" src="01-core.js"></script>
  <script type="text/babel" data-presets="react" src="02-tweaks.js"></script>
  <script type="text/babel" data-presets="react" src="03-creator.js"></script>
  <script type="text/babel" data-presets="react" src="04-host.js"></script>
  <script type="text/babel" data-presets="react" src="05-participant.js"></script>
  <script type="text/babel" data-presets="react" src="06-results.js"></script>
  <script type="text/babel" data-presets="react" src="07-app.js"></script>
</body>
</html>
