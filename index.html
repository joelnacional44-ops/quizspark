<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>QuizSpark — Plataforma de quizzes interactivos</title>
  <meta name="description" content="QuizSpark: plataforma educativa de quizzes interactivos para el aula." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- Archivo CSS original (se mantiene, pero añadiremos overrides estéticos avanzados) -->
  <link rel="stylesheet" href="styles.css" />

  <!-- ========== MEJORAS ESTÉTICAS GLOBALES (sin romper funcionalidad) ========== -->
  <style>
    /* ---------------------------------------------
       RESET VISUAL Y MEJORAS DE DISEÑO MODERNO
    --------------------------------------------- */
    * {
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f6f9fc 0%, #eef2f5 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    /* Mejora contenedor principal */
    #root {
      max-width: 1600px;
      margin: 0 auto;
      padding: 1rem;
    }

    /* Cards, paneles, secciones editor */
    .quiz-creator,
    .creator-container,
    .quiz-editor,
    .editor-panel,
    .questions-panel,
    .settings-panel,
    .question-card,
    .question-item,
    .config-card {
      background: rgba(255,255,255,0.92) !important;
      backdrop-filter: blur(0px);
      border-radius: 28px !important;
      box-shadow: 0 12px 28px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.02), inset 0 1px 0 rgba(255,255,255,0.8) !important;
      border: 1px solid rgba(255,255,255,0.6) !important;
      transition: all 0.2s ease;
    }

    /* Mejora títulos y secciones */
    h1, h2, h3, .section-title {
      font-family: 'Poppins', 'Inter', sans-serif;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #1E2A5E, #2A3F7A);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    /* ========== ICONOS: ALINEACIÓN PERFECTA ========== */
    button, .btn, .icon-btn, .action-button, [class*="icon"], 
    .icon-button, button svg, .btn-icon, .option-icon, .quiz-tool-btn {
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 8px !important;
      vertical-align: middle !important;
    }

    /* Forzar alineación vertical de cualquier ícono dentro de botones y elementos */
    button i, button span[class*="icon"], .icon, .material-icons, 
    svg:not(.keep-position) {
      display: inline-block !important;
      vertical-align: middle !important;
      margin-top: -2px !important;
    }

    /* Botones con iconos + texto */
    .btn-with-icon, .menu-item, .question-action {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Ajuste de contenedores flex para evitar desplazamiento */
    .flex-row, .question-header, .options-row, .settings-row,
    .question-actions, .toolbar-group, .quiz-metadata {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }

    /* Inputs / textareas más elegantes y con placeholder translúcido */
    input, textarea, select {
      background: #FFFFFF !important;
      border: 1.5px solid #E2E8F0 !important;
      border-radius: 20px !important;
      padding: 12px 18px !important;
      font-size: 0.95rem !important;
      transition: all 0.2s;
      font-family: 'Inter', monospace;
      box-shadow: 0 1px 2px rgba(0,0,0,0.02) !important;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #5E7CFF !important;
      box-shadow: 0 0 0 3px rgba(94, 124, 255, 0.2) !important;
      outline: none;
    }

    /* Placeholder translúcido y legible */
    ::placeholder, .placeholder-style {
      color: #8A99B4 !important;
      opacity: 0.75 !important;
      font-weight: 400;
    }

    /* Botones primarios + secundarios mejor look */
    button, .btn-primary, .btn-secondary, .add-question-btn, 
    .save-btn, .generate-password, .publish-btn {
      border-radius: 40px !important;
      font-weight: 600 !important;
      padding: 10px 20px !important;
      transition: transform 0.1s, box-shadow 0.2s !important;
      cursor: pointer;
      border: none;
    }

    button:hover, .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.1);
    }

    /* Ajuste para tarjetas de preguntas */
    .question-card, .question-item {
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      background: white;
      border-radius: 28px;
    }

    /* Sección configuración del quiz más limpia */
    .settings-section, .config-group {
      background: rgba(248,250,252,0.7);
      border-radius: 24px;
      padding: 1.2rem;
      margin-bottom: 1.2rem;
    }

    /* Mejora visual temporizador y puntuación */
    .score-config, .timer-config, .bonus-field {
      background: #F8FAFE;
      border-radius: 20px;
      padding: 12px 16px;
      border: 1px solid #E9EDF2;
    }

    /* Ajuste específico para campos de "Escribe tu pregunta aquí" 
       - esto complementa la limpieza JS que convertirá a placeholder real */
    textarea.question-text-input, 
    input.question-title-field,
    [data-question-input] {
      font-size: 1rem;
      line-height: 1.4;
      resize: vertical;
    }

    /* Mejora preview de imagen / medio */
    .media-upload-area, .image-preview {
      background: #F1F5F9;
      border-radius: 28px;
      padding: 12px;
      text-align: center;
      border: 1px dashed #CBD5E1;
    }

    /* Separadores visuales */
    hr {
      background: linear-gradient(to right, transparent, #CBD5E1, transparent);
      height: 1px;
      border: none;
      margin: 20px 0;
    }

    /* Badge de preguntas */
    .question-counter, .badge {
      background: #EEF2FF;
      color: #2C3E8F;
      border-radius: 50px;
      padding: 4px 12px;
      font-weight: 600;
      font-size: 0.8rem;
    }

    /* Ajuste general a los paneles con scroll suave */
    .creator-scroll {
      scroll-behavior: smooth;
    }

    /* botones de opciones múltiples y checkboxes alineados */
    .option-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    /* Mejora de accesibilidad y toques */
    @media (max-width: 768px) {
      .flex-row, .question-header {
        flex-direction: column;
        align-items: stretch;
      }
      button, .btn {
        justify-content: center;
      }
      #root {
        padding: 0.75rem;
      }
    }
  </style>

  <!-- Firebase y librerías externas (exactamente igual que original) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="root"></div>
  <noscript>
    <p style="text-align:center;padding:2rem;font-family:sans-serif;">
      Esta aplicación requiere JavaScript habilitado.
    </p>
  </noscript>

  <!-- CONFIGURACIÓN + AUTH (se mantienen intactos) -->
  <script src="00-firebase.js"></script>
  <script type="text/babel" data-presets="react" src="00b-auth.js"></script>

  <!-- Núcleo (íconos, datos base, helpers) y panel de ajustes -->
  <script type="text/babel" data-presets="react" src="01-core.js"></script>
  <script type="text/babel" data-presets="react" src="02-tweaks.js"></script>

  <!-- Creator (TopNav, Dashboard, Editor) -->
  <script type="text/babel" data-presets="react" src="03-creator.js"></script>

  <!-- Evaluación asincrónica online (estudiantes con enlace) -->
  <script type="text/babel" data-presets="react" src="08-online.js"></script>

  <!-- Sala en vivo tipo Kahoot -->
  <script type="text/babel" data-presets="react" src="09-live.js"></script>

  <!-- App principal (debe ir al final) -->
  <script type="text/babel" data-presets="react" src="07-app.js"></script>

  <!-- ========== SCRIPT DE MEJORA VISUAL + PLACEHOLDERS INTELIGENTES ========== -->
  <script>
    (function() {
      // Función para arreglar textos "fijos" que deberían ser placeholders en inputs/textarea
      // sin romper la lógica interna (solo modifica atributos y valor inicial si es placeholder hardcoded)
      function mejorarPlaceholders() {
        // Lista de textos que deben ser reemplazados por placeholder real
        const textosNoPlaceholder = [
          "Escribe tu pregunta aquí",
          "Escribe tu pregunta aquí...",
          "Agregar imagen o medio (opcional)",
          "Agregar imagen o medio",
          "Escribe la pregunta...",
          "Escribe tu pregunta"
        ];
        
        // Selecciona todos los inputs y textareas que tengan alguno de esos textos como valor actual
        const allInputs = document.querySelectorAll('input, textarea');
        allInputs.forEach(el => {
          const currentValue = el.value?.trim();
          if (currentValue && textosNoPlaceholder.some(text => currentValue === text || currentValue.includes(text) && currentValue.length < 35)) {
            // Verificar que no sea un campo con datos reales del usuario (si el valor es exactamente igual al placeholder genérico)
            const isExactlyPlaceholder = textosNoPlaceholder.some(ph => currentValue === ph || currentValue === ph.replace('...', ''));
            if (isExactlyPlaceholder || currentValue === "Escribe tu pregunta aquí" || currentValue === "Agregar imagen o medio (opcional)") {
              // Guardamos el texto como placeholder
              const placeholderText = currentValue;
              el.setAttribute('placeholder', placeholderText);
              el.value = '';        // Limpiamos para que el usuario no tenga que borrar
              // También forzar estilos
              el.classList.add('enhanced-placeholder');
            }
          }
        });

        // Caso específico para áreas de texto de pregunta (textarea con clases comunes)
        const textareas = document.querySelectorAll('textarea');
        textareas.forEach(ta => {
          const rawText = ta.innerText || ta.value;
          if (rawText && (rawText.includes("Escribe tu pregunta") || rawText === "Escribe tu pregunta aquí")) {
            if (!ta.getAttribute('data-fixed')) {
              ta.setAttribute('placeholder', ta.value || "Escribe tu pregunta aquí");
              ta.value = '';
              ta.setAttribute('data-fixed', 'true');
            }
          }
        });
      }

      // Función para corregir alineación de iconos (adicional a CSS)
      function corregirAlineacionIconos() {
        // Para cualquier elemento que contenga ícono svg o span con clase icon dentro de botón
        const buttonsWithIcons = document.querySelectorAll('button, .btn, .icon-btn, .action-btn');
        buttonsWithIcons.forEach(btn => {
          if (btn.querySelector('svg, i, .icon, .material-icons')) {
            btn.style.display = 'inline-flex';
            btn.style.alignItems = 'center';
            btn.style.gap = '8px';
          }
        });
        // Elementos dentro de listas de opciones
        const optionContainers = document.querySelectorAll('.option-item, .question-option, .choice-row');
        optionContainers.forEach(opt => {
          opt.style.display = 'flex';
          opt.style.alignItems = 'center';
          opt.style.gap = '12px';
        });
      }

      // Aplicar mejoras cuando el DOM se actualiza dinámicamente (React)
      let observer = null;
      function aplicarTodasMejoras() {
        mejorarPlaceholders();
        corregirAlineacionIconos();
        // Adicional: estilos para inputs que muestren placeholder translúcido visible
        const inputsWithPlaceholder = document.querySelectorAll('[placeholder]');
        inputsWithPlaceholder.forEach(inp => {
          inp.style.backgroundColor = '#ffffff';
        });
      }

      // Usar MutationObserver para cambios en el DOM (componentes React se montan/actualizan)
      function iniciarObservador() {
        if (observer) observer.disconnect();
        observer = new MutationObserver((mutations) => {
          let necesitaActualizar = false;
          for (let m of mutations) {
            if (m.addedNodes.length > 0 || m.type === 'attributes') {
              necesitaActualizar = true;
              break;
            }
          }
          if (necesitaActualizar) {
            aplicarTodasMejoras();
          }
        });
        observer.observe(document.body, { childList: true, subtree: true, attributes: false });
        aplicarTodasMejoras();
      }

      // Esperamos a que React monte el app (pero también ejecutamos lo antes posible)
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
          setTimeout(() => {
            aplicarTodasMejoras();
            iniciarObservador();
          }, 150);
        });
      } else {
        setTimeout(() => {
          aplicarTodasMejoras();
          iniciarObservador();
        }, 150);
      }

      // Reforzar después de 1 segundo para componentes que cargan más tarde (Firebase async)
      setTimeout(() => {
        aplicarTodasMejoras();
      }, 1000);
      setTimeout(() => {
        aplicarTodasMejoras();
      }, 2500);
    })();
  </script>

  <!-- ESTILOS ADICIONALES FLOTANTES PARA CORREGIR CUALQUIER ELEMENTO CON ICONOS CORRIDOS O INPUTS DUROS -->
  <style>
    /* Refuerzo de seguridad para todos los elementos interactivos */
    .quiz-editor button,
    .quiz-creator button,
    .settings-panel button,
    .question-item button,
    .toolbar button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    /* Para input/textarea con texto que se haya convertido a placeholder */
    textarea.enhanced-placeholder, input.enhanced-placeholder {
      color: #1E293B !important;
    }
    textarea.enhanced-placeholder::placeholder, input.enhanced-placeholder::placeholder {
      color: #94A3B8 !important;
      font-style: normal !important;
      font-weight: 400;
      opacity: 0.85;
    }
    
    /* Asegurar que los recuadros de "agregar pregunta" tengan buena separación */
    .add-question-menu, .question-type-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 16px 0;
    }
    
    /* Estilo para botones de tipo opción que contienen íconos + texto */
    .type-option {
      background: #F1F4F9;
      border-radius: 60px;
      padding: 8px 20px;
      transition: 0.1s;
      font-weight: 500;
    }
    .type-option:hover {
      background: #E6EDFC;
      transform: scale(0.98);
    }
    
    /* Hace que la interfaz de creación sea más limpia y los íconos nunca se desborden */
    .icon, [class*="Icon"] {
      font-size: 1.25rem;
      line-height: 1;
    }
    
    /* Evita que elementos floten mal */
    .clearfix {
      clear: both;
    }
    
    /* Dashboard del creador, alineación cards */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    /* Tweak para textareas grandes de pregunta */
    .question-editor textarea {
      min-height: 90px;
    }

    /* Prevenir background extraños en inputs */
    input:-webkit-autofill,
    textarea:-webkit-autofill {
      background-color: #fff !important;
      -webkit-box-shadow: 0 0 0px 1000px white inset !important;
    }

    /* Animación suave en interacción */
    .question-card, .settings-panel {
      transition: box-shadow 0.25s ease, transform 0.2s;
    }
    .question-card:hover {
      box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.12);
    }
    
    /* Ajusta específicamente el área de 'Puntuación de esta pregunta' y bonus para que se vea moderna */
    .score-bonus-container {
      background: #F8F9FF;
      border-radius: 28px;
      padding: 16px;
      margin-top: 12px;
    }
    label {
      font-weight: 500;
      color: #1e293b;
      margin-bottom: 6px;
      display: inline-block;
    }
    .inline-label {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    /* Mejora de aspecto para el generador de contraseña y campos */
    .password-field {
      background: #F1F5F9;
      border-radius: 50px;
      padding: 8px 16px;
      font-family: monospace;
      letter-spacing: 1px;
    }
    button.generate-password {
      background: #2D3E6E;
      color: white;
    }
    
    /* Hace que los botones del modo 'Ritmo del Quiz' se vean mejor */
    .rhythm-option {
      background: white;
      border-radius: 36px;
      padding: 6px 18px;
      border: 1px solid #CBD5E1;
      transition: all 0.1s;
    }
    .rhythm-option.active {
      background: #5E7CFF;
      border-color: #5E7CFF;
      color: white;
    }

    /* Iconos dentro de campos de configuración */
    .config-icon {
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.05));
    }

    /* CORRECCIÓN EXTRA - cualquier texto de "Escribe tu pregunta aquí" que haya quedado por algun componente modal */
    .modal textarea, .dialog textarea, [role="dialog"] textarea, .popup textarea {
      background: white;
    }
  </style>
</body>
</html>
