<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <!-- viewport corregido: evita zoom automático al tocar inputs en iOS/Android -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>QuizSpark — Plataforma de quizzes interactivos</title>
  <meta name="description" content="QuizSpark: plataforma educativa de quizzes interactivos para el aula." />

  <!-- Evitar que iOS Safari cambie tamaños de fuente automáticamente -->
  <meta name="format-detection" content="telephone=no" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- SheetJS para Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <noscript>
    <p style="text-align:center;padding:2rem;font-family:sans-serif;">
      Esta aplicación requiere JavaScript habilitado.
    </p>
  </noscript>

  <script src="00-firebase.js"></script>
  <script type="text/babel" data-presets="react" src="00b-auth.js"></script>
  <script type="text/babel" data-presets="react" src="01-core.js"></script>
  <script type="text/babel" data-presets="react" src="02-tweaks.js"></script>
  <script type="text/babel" data-presets="react" src="03-creator.js"></script>
  <script type="text/babel" data-presets="react" src="08-online.js"></script>
  <script type="text/babel" data-presets="react" src="09-live.js"></script>
  <script type="text/babel" data-presets="react" src="07-app.js"></script>
</body>
</html>
