<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizSpark — Plataforma de quizzes interactivos</title>
  <meta name="description" content="QuizSpark: plataforma educativa de quizzes interactivos para el aula." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Preconexión temprana a los CDNs de scripts: ahorra el handshake TLS -->
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="preconnect" href="https://www.gstatic.com" />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css?v=2" />

  <!--
    Versiones EXACTAS: unpkg resuelve "react@18" con una redirección 302
    extra por archivo. Fijar la versión elimina ese viaje de ida y vuelta.
    "defer": descarga en paralelo sin bloquear el parseo del HTML,
    manteniendo el orden de ejecución entre scripts.
  -->
  <script defer crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script defer crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script defer src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- Generador de códigos QR (para el modo proyección de la sala en vivo) -->
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    /* Splash de carga: visible al instante mientras Babel compila la app.
       React lo reemplaza automáticamente al montar en #root. */
    .qs-splash {
      min-height: 100vh; display: grid; place-items: center;
      background: #f8fafc; font-family: "Segoe UI", system-ui, sans-serif;
    }
    .qs-splash-inner { text-align: center; color: #64748b; }
    .qs-splash-spinner {
      width: 44px; height: 44px; margin: 0 auto 14px;
      border: 4px solid #ede9fe; border-top-color: #7c3aed;
      border-radius: 50%; animation: qs-spin 0.8s linear infinite;
    }
    @keyframes qs-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div class="qs-splash">
      <div class="qs-splash-inner">
        <div class="qs-splash-spinner"></div>
        <p style="font-weight:600;margin:0;">Cargando QuizSpark…</p>
      </div>
    </div>
  </div>
  <script>
    // Red de seguridad de ARRANQUE: si la app no logra iniciar (error de
    // sintaxis, CDN caído, etc.), reemplaza el spinner por un mensaje claro
    // en vez de dejar la pantalla en blanco. Solo actúa si la app aún no
    // ha montado (el splash sigue presente).
    (function () {
      var shown = false;
      function appNotStarted() {
        var root = document.getElementById("root");
        return root && root.querySelector(".qs-splash");
      }
      function showFatal(detail) {
        if (shown || !appNotStarted()) return;
        shown = true;
        document.getElementById("root").innerHTML =
          '<div class="qs-splash"><div class="qs-splash-inner" style="max-width:420px;padding:20px;">' +
          '<div style="font-size:40px;margin-bottom:10px;">⚠️</div>' +
          '<p style="font-weight:700;font-size:17px;color:#0f172a;margin:0 0 6px;">Algo salió mal al cargar QuizSpark</p>' +
          '<p style="font-size:13px;margin:0 0 16px;">Suele resolverse recargando la página.</p>' +
          '<button onclick="location.reload()" style="background:#7c3aed;color:#fff;border:0;border-radius:12px;padding:12px 22px;font-size:15px;font-weight:700;cursor:pointer;">↻ Recargar</button>' +
          '<details style="margin-top:18px;text-align:left;font-size:11px;color:#94a3b8;"><summary style="cursor:pointer;">Detalle técnico (envíalo si pides ayuda)</summary><pre style="white-space:pre-wrap;word-break:break-word;">' +
          String(detail).replace(/</g, "&lt;") + "</pre></details>" +
          "</div></div>";
      }
      window.addEventListener("error", function (e) {
        showFatal(e.message + (e.filename ? "\n" + e.filename + ":" + e.lineno : ""));
      });
      window.addEventListener("unhandledrejection", function (e) {
        showFatal("Promise: " + (e.reason && e.reason.message ? e.reason.message : e.reason));
      });
      // Si en 25 segundos la app no ha montado (sin error visible), avisar.
      setTimeout(function () {
        showFatal("La carga está tardando demasiado. Puede ser la conexión a internet o un bloqueo de red del colegio.");
      }, 25000);
    })();
  </script>
  <noscript>
    <p style="text-align:center;padding:2rem;font-family:sans-serif;">
      Esta aplicación requiere JavaScript habilitado.
    </p>
  </noscript>

  <!--
    VERSIONADO: el "?v=2" obliga a los navegadores a descargar la versión
    nueva de cada archivo. Al subir cualquier cambio de .js o .css, sube
    el número en TODOS los src/href de archivos locales (v=3, v=4, ...).
  -->
  <!-- Configuración + auth -->
  <script defer src="00-firebase.js?v=2"></script>
  <script type="text/babel" data-presets="react" src="00b-auth.js?v=2"></script>

  <!-- Núcleo -->
  <script type="text/babel" data-presets="react" src="01-core.js?v=2"></script>
  <script type="text/babel" data-presets="react" src="02-tweaks.js?v=2"></script>

  <!-- Creator -->
  <script type="text/babel" data-presets="react" src="03-creator.js?v=2"></script>

  <!-- Evaluación asincrónica online -->
  <script type="text/babel" data-presets="react" src="08-online.js?v=2"></script>

  <!-- Sala en vivo -->
  <script type="text/babel" data-presets="react" src="09-live.js?v=2"></script>

  <!-- App principal -->
  <script type="text/babel" data-presets="react" src="07-app.js?v=2"></script>
</body>
</html>
